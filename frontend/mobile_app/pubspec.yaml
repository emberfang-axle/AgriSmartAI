name: agrismartai
description: AI-Powered Rice Crop Disease Monitoring — New Bataan, Davao de Oro
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Camera & permissions
  camera: ^0.10.5+9
  permission_handler: ^11.3.1

  # Notifications
  flutter_local_notifications: ^17.2.2

  # State management
  provider: ^6.1.2

  # Networking
  http: ^1.2.2
  http_parser: ^4.0.2

  # Storage & utilities
  path_provider: ^2.1.3
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  uuid: ^4.4.2
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
