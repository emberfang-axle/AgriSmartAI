<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="AgriSmartAI Admin Dashboard">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="icons/Icon-192.png"/>
  <title>AgriSmartAI Admin</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body {
      background-color: #0B3B1F;
      margin: 0;
      overflow: hidden;
    }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0B3B1F;
      color: white;
      font-family: sans-serif;
      gap: 16px;
    }
    #loading h2 { margin: 0; font-size: 24px; color: #D4A017; }
    #loading p  { margin: 0; font-size: 14px; opacity: 0.7; }
  </style>
</head>
<body>
  <div id="loading">
    <h2>AgriSmartAI Admin</h2>
    <p>Loading dashboard...</p>
  </div>
  <script>
    const serviceWorkerVersion = null;
    window.addEventListener('load', function() {
      document.getElementById('loading').style.display = 'none';
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
